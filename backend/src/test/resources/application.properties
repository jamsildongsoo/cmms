spring.application.name=cmms-backend-test
# Use in-memory H2 with DB_CLOSE_DELAY=-1 to keep data between transactions in the same context
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Let Hibernate generate schema for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Disable manual schema.sql for tests to avoid conflicts
spring.sql.init.mode=never

# JWT config for tests
jwt.secret=Y21tc19zZWNyZXRfa2V5X2Zvcl9qd3RfaHR0cHM6Ly9leGFtcGxlLmNvbV9tdXN0X2JlX2F0X2xlYXN0XzI1Nl9iaXRzX2xvbmc=
jwt.expiration=86400000

# Additional config for tests (Isolated from Dev DB)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
file.upload-dir=uploads/test

