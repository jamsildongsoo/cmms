spring.application.name=cmms-backend-test
# Use in-memory H2 with DB_CLOSE_DELAY=-1 to keep data between transactions in the same context
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Let Hibernate generate schema for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Disable manual schema.sql for tests to avoid conflicts
spring.sql.init.mode=never
