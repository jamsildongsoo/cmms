<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <h2 class="header-title">점검 계획/실적 보고서</h2>
        
        <table>
            <tr>
                <th>문서번호</th>
                <td th:text="${doc.inspectionId}"></td>
                <th>점검유형</th>
                <td th:text="${doc.codeItem}"></td>
            </tr>
            <tr>
                <th>점검명</th>
                <td th:text="${doc.name}"></td>
                <th>단계</th>
                <td th:text="${doc.stage}"></td>
            </tr>
            <tr>
                <th>대상설비</th>
                <td th:text="${doc.equipmentId}"></td>
                <th>점검일자</th>
                <td th:text="${doc.date}"></td>
            </tr>
        </table>

        <div th:if="${doc.items != null and !doc.items.isEmpty()}">
            <h3 class="section-title">점검 항목</h3>
            <table class="item-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">No</th>
                        <th>점검항목</th>
                        <th>점검방법</th>
                        <th style="width: 80px;">하한값</th>
                        <th style="width: 80px;">기준값</th>
                        <th style="width: 80px;">상한값</th>
                        <th style="width: 60px;">단위</th>
                        <th style="width: 80px;">결과값</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${doc.items}">
                        <td class="text-center" th:text="${item.lineNo}"></td>
                        <td th:text="${item.name}"></td>
                        <td th:text="${item.method}"></td>
                        <td class="text-center" th:text="${item.minVal}"></td>
                        <td class="text-center" th:text="${item.stdVal}"></td>
                        <td class="text-center" th:text="${item.maxVal}"></td>
                        <td class="text-center" th:text="${item.unit}"></td>
                        <td class="text-center font-bold" th:text="${item.resultVal}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${doc.note != null and !doc.note.isEmpty()}">
            <h3 class="section-title">비고/특이사항</h3>
            <div class="note-box" th:text="${doc.note}"></div>
        </div>
    </div>
</body>
</html>
