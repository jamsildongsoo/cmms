<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; border: 1px solid #eee; }
        .header-title { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #f4f4f4; width: 15%; }
        td { width: 35%; }
        .section-title { margin-top: 25px; margin-bottom: 10px; font-size: 18px; border-left: 4px solid #007bff; padding-left: 10px; }
        .item-table th, .item-table td { padding: 8px; border: 1px solid #ddd; }
        .item-table thead th { text-align: center; background-color: #f8f9fa; }
        .note-box { padding: 15px; background-color: #f9f9f9; border: 1px solid #ddd; min-height: 100px; white-space: pre-wrap; font-size: 14px; }
        .text-center { text-align: center; }
        .font-bold { font-weight: bold; }

        /* Work Permit checklist styles */
        .checklist-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .checklist-table th, .checklist-table td { border: 1px solid #ddd; padding: 6px 10px; font-size: 13px; }
        .checklist-table thead th { background-color: #f4f4f4; text-align: center; font-weight: bold; }
        .checklist-table .chk { width: 40px; text-align: center; font-weight: bold; }
        .checklist-table .chk.checked { color: #2563eb; }
        .checklist-table .val { width: 80px; text-align: center; color: #1d4ed8; font-weight: bold; }
        .checklist-table .gas-row td { background-color: #f0f9ff; }
    </style>
</head>
<body>
    <div class="container">
        <div th:replace="~{__${content}__}">
            <!-- Content will be replaced by specific templates -->
        </div>

    </div>
</body>
</html>
